<meta name="theme-color" content="#0d1117">
<meta name="author" content="{{ .Site.Params.author }}">
{{ if .IsPage }}
  <meta property="article:author" content="{{ .Site.Params.author }}">
{{ end }}
{{ if .Site.Params.analytics.cloudflareToken }}
<script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token":"{{ .Site.Params.analytics.cloudflareToken }}"}'></script>
{{ end }}
